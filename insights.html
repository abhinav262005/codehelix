<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insights — CodeHelix</title>
    <meta name="description" content="Analytics and insights for your CodeHelix workspace." />
    <link rel="stylesheet" href="/css/index.css" />
    <link rel="stylesheet" href="/css/insights.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>

<body>

    <div class="aurora-bg">
        <div class="aurora-blob"></div>
    </div>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            <div class="page-header" style="margin-bottom:var(--space-8); position:relative; z-index:1;">
                <div
                    style="background: linear-gradient(135deg, rgba(0, 255, 163, 0.05) 0%, rgba(34, 211, 238, 0.05) 100%); padding: var(--space-6) var(--space-8); border-radius: var(--radius-xl); border: 1px solid rgba(0, 255, 163, 0.15); width: 100%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,255,0.05); flex-wrap: wrap; gap: 16px;">
                    <div>
                        <h1 class="page-title"
                            style="font-size: clamp(1.8rem, 3vw, 2.4rem); font-weight: 800; background: linear-gradient(to right, #00ffa3, #22d3ee); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 30px rgba(0,255,163,0.3); margin-bottom: 6px; letter-spacing: -0.02em;">
                            Insights</h1>
                        <p class="page-subtitle"
                            style="font-size: 1rem; color: var(--text-secondary); font-weight: 500;">Workspace analytics
                            and activity overview. No rankings, no competition.</p>
                    </div>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="insights-stats">
                <div class="glass-card dash-stat-card">
                    <div class="stat-glow green"></div>
                    <div class="stat-lbl">Total Problems</div>
                    <div class="stat-num green" id="s-problems">—</div>
                </div>
                <div class="glass-card dash-stat-card">
                    <div class="stat-glow purple"></div>
                    <div class="stat-lbl">Total Solutions</div>
                    <div class="stat-num purple" id="s-solutions">—</div>
                </div>
                <div class="glass-card dash-stat-card">
                    <div class="stat-glow cyan"></div>
                    <div class="stat-lbl">Easy Problems</div>
                    <div class="stat-num cyan" id="s-easy">—</div>
                </div>
                <div class="glass-card dash-stat-card">
                    <div class="stat-glow" style="background:var(--diff-medium)"></div>
                    <div class="stat-lbl">Avg Solutions / Problem</div>
                    <div class="stat-num" style="color:var(--diff-medium)" id="s-avg">—</div>
                </div>
            </div>

            <!-- Charts -->
            <div class="insights-grid">
                <!-- Difficulty Donut -->
                <div class="glass-card chart-card">
                    <div class="chart-title">Difficulty Distribution</div>
                    <div class="chart-container">
                        <canvas id="diff-chart"></canvas>
                    </div>
                    <div class="diff-legend" id="diff-legend"></div>
                </div>

                <!-- Solutions Timeline -->
                <div class="glass-card chart-card">
                    <div class="chart-title">Solutions — Last 14 Days</div>
                    <div class="chart-container">
                        <canvas id="timeline-chart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Activity Feed + Problems Timeline -->
            <div class="insights-grid">
                <!-- Problems timeline chart -->
                <div class="glass-card chart-card">
                    <div class="chart-title">Problems Posted — Last 14 Days</div>
                    <div class="chart-container">
                        <canvas id="problems-timeline-chart"></canvas>
                    </div>
                </div>

                <!-- Activity Feed -->
                <div class="glass-card" style="padding:var(--space-6);">
                    <div class="dash-section-header">
                        <span class="dash-section-title">Live Activity</span>
                    </div>
                    <div class="insights-feed" id="activity-feed">
                        <div class="empty-state">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script type="module">
        import { requireAuth, getProfile, showToast, formatDate, escapeHtml } from '/js/auth.js';
        import { supabase } from '/js/supabase.js';
        import { initSidebar } from '/js/sidebar.js';

        const session = await requireAuth('/login.html');
        await initSidebar('insights');

        // ─── Chart defaults ───────────────────────────────
        Chart.defaults.color = '#64748b';
        Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
        Chart.defaults.font.family = "'Inter', sans-serif";

        const GREEN = '#00ffa3';
        const PURPLE = '#a855f7';
        const CYAN = '#22d3ee';
        const YELLOW = '#f59e0b';
        const RED = '#ef4444';

        // ─── Dates helper ─────────────────────────────────
        function last14Days() {
            const days = [];
            for (let i = 13; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                days.push(d.toISOString().split('T')[0]);
            }
            return days;
        }

        function shortDate(iso) {
            return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        // ─── Load all data ─────────────────────────────────
        async function loadAll() {
            const [{ data: problems }, { data: solutions }] = await Promise.all([
                supabase.from('problems').select('id, title, difficulty, created_at, profiles(username, accent_color, avatar_url)'),
                supabase.from('solutions').select('id, created_at, language, problem_id, profiles(username, accent_color, avatar_url), problems(title)').order('created_at', { ascending: false }),
            ]);

            const pCount = problems?.length || 0;
            const sCount = solutions?.length || 0;
            const easyCount = (problems || []).filter(p => p.difficulty === 'Easy').length;
            const avg = pCount ? (sCount / pCount).toFixed(1) : '0';

            document.getElementById('s-problems').textContent = pCount;
            document.getElementById('s-solutions').textContent = sCount;
            document.getElementById('s-easy').textContent = easyCount;
            document.getElementById('s-avg').textContent = avg;

            // Difficulty distribution
            const medCount = (problems || []).filter(p => p.difficulty === 'Medium').length;
            const hardCount = (problems || []).filter(p => p.difficulty === 'Hard').length;

            new Chart(document.getElementById('diff-chart'), {
                type: 'doughnut',
                data: {
                    labels: ['Easy', 'Medium', 'Hard'],
                    datasets: [{
                        data: [easyCount, medCount, hardCount],
                        backgroundColor: ['rgba(0,255,163,0.7)', 'rgba(245,158,11,0.7)', 'rgba(239,68,68,0.7)'],
                        borderColor: ['rgba(0,255,163,0.1)', 'rgba(245,158,11,0.1)', 'rgba(239,68,68,0.1)'],
                        borderWidth: 1,
                        hoverOffset: 8,
                    }]
                },
                options: {
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw}` } }
                    },
                    cutout: '65%',
                    responsive: true,
                    maintainAspectRatio: false,
                }
            });

            document.getElementById('diff-legend').innerHTML = [
                { label: 'Easy', color: GREEN },
                { label: 'Medium', color: YELLOW },
                { label: 'Hard', color: RED },
            ].map(({ label, color }) => `
    <div class="diff-legend-item">
      <div class="diff-legend-dot" style="background:${color}"></div>
      ${label}
    </div>
  `).join('');

            // Solutions timeline
            const days = last14Days();
            const solsByDay = {};
            days.forEach(d => { solsByDay[d] = 0; });
            (solutions || []).forEach(s => {
                const day = s.created_at.split('T')[0];
                if (day in solsByDay) solsByDay[day]++;
            });

            new Chart(document.getElementById('timeline-chart'), {
                type: 'bar',
                data: {
                    labels: days.map(shortDate),
                    datasets: [{
                        label: 'Solutions',
                        data: days.map(d => solsByDay[d]),
                        backgroundColor: 'rgba(0,255,163,0.2)',
                        borderColor: GREEN,
                        borderWidth: 1,
                        borderRadius: 4,
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1 },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        x: { grid: { display: false } }
                    },
                    responsive: true,
                    maintainAspectRatio: false,
                }
            });

            // Problems timeline
            const probsByDay = {};
            days.forEach(d => { probsByDay[d] = 0; });
            (problems || []).forEach(p => {
                const day = p.created_at.split('T')[0];
                if (day in probsByDay) probsByDay[day]++;
            });

            new Chart(document.getElementById('problems-timeline-chart'), {
                type: 'bar',
                data: {
                    labels: days.map(shortDate),
                    datasets: [{
                        label: 'Problems',
                        data: days.map(d => probsByDay[d]),
                        backgroundColor: 'rgba(168,85,247,0.2)',
                        borderColor: PURPLE,
                        borderWidth: 1,
                        borderRadius: 4,
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1 },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        x: { grid: { display: false } }
                    },
                    responsive: true,
                    maintainAspectRatio: false,
                }
            });

            // Activity feed
            const events = [
                ...(problems || []).map(p => ({
                    type: 'problem',
                    ts: p.created_at,
                    user: p.profiles?.username || 'Member',
                    title: p.title || 'a problem',
                    problemId: p.id,
                    color: p.profiles?.accent_color || '#a855f7',
                    avatarUrl: p.profiles?.avatar_url
                })),
                ...(solutions || []).map(s => ({
                    type: 'solution',
                    ts: s.created_at,
                    user: s.profiles?.username || 'Member',
                    title: s.problems?.title || 'a problem',
                    problemId: s.problem_id,
                    lang: s.language,
                    color: s.profiles?.accent_color || '#00ffa3',
                    avatarUrl: s.profiles?.avatar_url
                }))
            ].sort((a, b) => new Date(b.ts) - new Date(a.ts)).slice(0, 15);

            const feed = document.getElementById('activity-feed');
            if (!events.length) {
                feed.innerHTML = `<div class="empty-state"><div class="empty-icon">◈</div><div class="empty-title">No activity yet</div></div>`;
            } else {
                feed.innerHTML = events.map(e => {
                    const initial = (e.user || 'M')[0].toUpperCase();

                    const actionHtml = e.type === 'problem'
                        ? `posted a new problem: <a href="/problem-detail.html?id=${e.problemId}" style="color:var(--accent-green);text-decoration:none;">"${escapeHtml(e.title)}"</a>`
                        : `submitted a <strong>${escapeHtml(e.lang || '')}</strong> solution for <a href="/problem-detail.html?id=${e.problemId}" style="color:var(--accent-green);text-decoration:none;">"${escapeHtml(e.title)}"</a>`;

                    return `
      <div class="feed-item">
        <div class="feed-icon" style="width:32px;height:32px;border-radius:50%;background:${e.color}22; border:1px solid ${e.color}44; color:${e.color}; overflow:hidden; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.75rem; flex-shrink:0;">
            ${e.avatarUrl ? `<img src="${e.avatarUrl}" style="width:100%;height:100%;object-fit:cover;">` : escapeHtml(initial)}
        </div>
        <div class="feed-info">
          <div class="feed-text">
            <strong>${escapeHtml(e.user)}</strong> ${actionHtml}
          </div>
          <div class="feed-time">${formatDate(e.ts)}</div>
        </div>
      </div>
    `;
                }).join('');
            }
        }

        await loadAll();
    </script>
</body>

</html>
