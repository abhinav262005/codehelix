<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — CodeHelix</title>
  <meta name="description" content="Sign in to your private CodeHelix DSA workspace." />
  <link rel="stylesheet" href="/css/index.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>

<body>

  <div class="aurora-bg">
    <div class="aurora-blob"></div>
  </div>

  <main class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-mark">CH</div>
        <div class="auth-logo-text">Code<span>Helix</span></div>
      </div>

      <!-- Header -->
      <div class="auth-title">
        <h1>Welcome back</h1>
        <p>Sign in to your private workspace</p>
      </div>

      <!-- Error -->
      <div class="auth-error" id="auth-error" style="display:none;">
        <span>⚠</span>
        <span id="auth-error-msg">Invalid email or password.</span>
      </div>

      <!-- Form -->
      <form class="auth-form" id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@codehelix.com" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••••" autocomplete="current-password"
            required />
        </div>

        <button type="submit" class="auth-submit" id="login-btn">
          Sign In
        </button>
      </form>

      <div class="auth-note">
        CodeHelix is a <strong>private workspace</strong>.<br />
        Access is by invite only.
      </div>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script type="module">
    import { signIn, showToast } from '/js/auth.js';

    // Removed requireGuest('/dashboard.html') so logged-in users can still see the login form

    const form = document.getElementById('login-form');
    const btn = document.getElementById('login-btn');
    const errBox = document.getElementById('auth-error');
    const errMsg = document.getElementById('auth-error-msg');

    function showError(msg) {
      errMsg.textContent = msg;
      errBox.style.display = 'flex';
    }
    function hideError() { errBox.style.display = 'none'; }
    function setLoading(on) {
      btn.disabled = on;
      btn.textContent = on ? 'Signing in...' : 'Sign In';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      setLoading(true);

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please fill in all fields.');
        setLoading(false);
        return;
      }

      try {
        await signIn(email, password);
        showToast('Welcome back! ✦', 'success');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 500);
      } catch (err) {
        const msg = err?.message || 'Authentication failed';
        if (msg.includes('Invalid login') || msg.includes('credentials') || msg.includes('Email not confirmed')) {
          showError('Invalid email or password.');
        } else if (msg.includes('suspended') || msg.includes('banned')) {
          showError('This account has been suspended. Contact your admin.');
        } else {
          showError(msg);
        }
        setLoading(false);
      }
    });
  </script>
</body>

</html>
